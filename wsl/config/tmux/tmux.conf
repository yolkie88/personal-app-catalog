# Managed by personal-app-catalog. Sanitized template only — no secrets, no identity.
# Copied to ~/.tmux.conf by `wsl/bootstrap.sh --config`.

# Prefix: keep C-b, add C-a as a convenient second prefix.
set -g prefix2 C-a
bind C-a send-prefix -2

# Modern defaults.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reload config.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Intuitive splits that keep the current path.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vi-style pane navigation.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vi copy mode.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Status bar.
set -g status-interval 5
set -g status-style "bg=default fg=white"
set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M "
