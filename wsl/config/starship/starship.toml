# Managed by personal-app-catalog. Sanitized template only — no secrets, no identity.
# Copied to ~/.config/starship.toml by `wsl/bootstrap.sh --config`.
# Docs: https://starship.rs/config/

add_newline = true
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".nvmrc"]

[python]
symbol = " "
format = "[$symbol($version )]($style)"

[kubernetes]
disabled = false
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) '
style = "bold blue"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
