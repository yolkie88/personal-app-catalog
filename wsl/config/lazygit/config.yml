# Managed by personal-app-catalog. Sanitized template only — no secrets, no identity.
# Base config (no external pager). Copied to ~/.config/lazygit/config.yml by
# `wsl/bootstrap.sh --config` when delta is NOT installed; config.delta.yml is used
# instead when delta is present. Docs: https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md

gui:
  nerdFontsVersion: "3"
  showFileTree: true
  showRandomTip: false
  scrollHeight: 4
  sidePanelWidth: 0.3333
git:
  commit:
    signOff: false
  autoFetch: true
update:
  method: never
keybinding:
  universal:
    quit: q
