# mihomo 脱敏示例配置 / personal-app-catalog
#
# 用法：复制为 config.yaml，放进 mihomo 配置目录后填入私有值。
#   Windows 默认目录：%USERPROFILE%\.config\mihomo\config.yaml
#   运行：mihomo -d <配置目录>
#
# 这是模板，只含占位值。真实订阅、节点、secret 不入库
# （见 windows/docs/manual-boundaries.md）。需要填写的私有项以 REPLACE_ME 标出。

# ---- 基础监听（基线见 windows/docs/proxy.md）----
mixed-port: 7890          # HTTP/SOCKS 统一端口，工具都指向 127.0.0.1:7890
allow-lan: false          # 不对局域网开放代理
bind-address: 127.0.0.1
mode: rule
log-level: info

# ---- 控制端 / Web UI ----
# 控制端只监听本机；secret 必填，换成本机随机值，不要留默认、不要入库。
external-controller: 127.0.0.1:9090
secret: "REPLACE_ME_LOCAL_SECRET"

# 托管面板（metacubexd / zashboard / yacd）从 https 访问本地 http 控制端时需放开 CORS：
external-controller-cors:
  allow-origins: ["*"]
  allow-private-network: true

# 可选：让 mihomo 自托管面板（离线可用），面板地址 http://127.0.0.1:9090/ui/
# external-ui: ui
# external-ui-name: metacubexd
# external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# ---- DNS ----
# 完整生效于 TUN / fake-ip 模式；系统代理模式下，它决定 mihomo 对直连和规则匹配
# 域名的解析方式（代理流量的域名解析通常在远端完成）。
dns:
  enable: true
  ipv6: false

  # enhanced-mode / fake-ip 主要配合 TUN 使用，按需开启：
  # enhanced-mode: fake-ip
  # fake-ip-range: 198.18.0.1/16
  # fake-ip-filter: ["+.lan", "+.local", "geosite:cn"]

  # 用来解析下面 DoH 服务器域名的引导 DNS，必须是纯 IP：
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 默认解析器（建议用加密 DNS）：
  nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query

  # 可能被污染的结果走 fallback，再按地区过滤：
  fallback:
    - https://8.8.8.8/dns-query
    - https://1.0.0.1/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

  # *** 指定某些域名走特定 DNS ***
  # key 是域名匹配（支持 +. 通配、geosite:、rule-set:），value 是该域名使用的 DNS。
  # 命中 policy 的域名会跳过 fallback，直接用这里指定的解析器。
  nameserver-policy:
    "geosite:cn":
      - https://223.5.5.5/dns-query        # 国内域名走阿里 DoH
    "+.company.internal":
      - 10.0.0.53                          # 内网域名走内网 DNS（按需改/删）
    "+.example.com":
      - 8.8.8.8                            # 指定单个域名走指定 DNS（示例）

# ---- 节点来源 ----
# 默认主力 = 自建节点（下面的 proxies 段）。订阅只作临时应急：默认关闭，
# 自建节点全挂时再按注释整段启用。providers/ 目录已被 .gitignore 忽略。

# 自建节点（默认主力）：VLESS + Vision + REALITY 模板，私有值用 REPLACE_ME 标出。
proxies:
  - name: "vless-reality"
    type: vless
    server: REPLACE_ME_SERVER          # 服务器地址或域名
    port: 443
    uuid: REPLACE_ME_UUID              # 服务端生成的 UUID
    network: tcp
    udp: true
    tls: true
    flow: xtls-rprx-vision             # Vision 流控（REALITY 标配）
    servername: REPLACE_ME_SNI         # REALITY 借用的目标域名，需与服务端 dest / serverNames 一致
    client-fingerprint: chrome         # uTLS 指纹：chrome / firefox / safari / ios / random
    reality-opts:
      public-key: REPLACE_ME_PUBLIC_KEY  # 服务端公钥（x25519，与私钥配对）
      short-id: REPLACE_ME_SHORT_ID      # 可选，与服务端 short-id 一致；没有就删掉本行

# 应急订阅（可选，默认关闭）：仅在自建节点不可用时临时启用。
# 启用步骤：① 取消下面 proxy-providers 整段注释并填入订阅 URL；
#           ② 取消 proxy-groups 里 EMERGENCY 组的注释；
#           ③ 取消 PROXY 组里 "- EMERGENCY" 那行的注释。
# proxy-providers:
#   airport:
#     type: http
#     url: "REPLACE_ME_SUBSCRIPTION_URL"
#     interval: 86400
#     path: ./providers/airport.yaml
#     health-check:
#       enable: true
#       url: https://www.gstatic.com/generate_204
#       interval: 300

proxy-groups:
  # 主入口：默认就走自建 vless-reality（select 组默认选第一项）。规则里的 PROXY 都指向这里。
  - name: PROXY
    type: select
    proxies:
      - vless-reality
      - DIRECT
      # 应急时取消下一行注释（并启用上面的订阅 + 下面的 EMERGENCY 组）：
      # - EMERGENCY

  # 多个自建节点时启用，自动择优（当前只有一个，默认关闭）：
  # - name: AUTO
  #   type: url-test
  #   proxies:
  #     - vless-reality
  #   url: https://www.gstatic.com/generate_204
  #   interval: 300

  # 应急组（默认关闭）：自建节点全挂时切到 PROXY -> EMERGENCY，从订阅里自动回落到可用节点。
  # - name: EMERGENCY
  #   type: fallback
  #   use:
  #     - airport
  #   url: https://www.gstatic.com/generate_204
  #   interval: 300

# ---- 规则 ----
# GEOSITE/GEOIP 依赖 geo 数据库，mihomo 启动时若缺失会自动下载（需联网）。
# 规则自上而下匹配，命中即停；MATCH 是兜底。
rules:
  # 局域网 / 本机直连
  - GEOIP,private,DIRECT,no-resolve
  - GEOSITE,private,DIRECT

  # 广告拦截（可选，默认注释）
  # - GEOSITE,category-ads-all,REJECT

  # 自定义示例：把特定域名固定走代理或直连（按需改/删）
  - DOMAIN-SUFFIX,openai.com,PROXY
  - DOMAIN-SUFFIX,lan,DIRECT

  # 国内直连
  - GEOSITE,cn,DIRECT
  - GEOIP,cn,DIRECT,no-resolve

  # 其余走代理
  - MATCH,PROXY

# ---- TUN（兜底，默认关闭）----
# TUN 容易和 WSL / Docker / VPN / Tailscale / 内网路由冲突，不建议默认常开；
# 仅在 per-app / 应用内代理都不奏效时按需临时开启。参考基线（见 manual-boundaries.md）：
# tun:
#   enable: true
#   stack: mixed
#   auto-route: true
#   auto-detect-interface: true
#   dns-hijack: [any:53, tcp://any:53]
#   strict-route: true
