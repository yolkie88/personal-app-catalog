# mihomo 脱敏示例配置 / personal-app-catalog
#
# 用法：复制为 config.yaml，放进 mihomo 配置目录后填入私有值。
#   Windows 默认目录：%USERPROFILE%\.config\mihomo\config.yaml
#   运行：mihomo -d <配置目录>
#
# 这是模板，只含占位值。真实订阅、节点、secret 不入库
# （见 windows/docs/manual-boundaries.md）。需要填写的私有项以 REPLACE_ME 标出。

# ---- 基础监听（基线见 windows/docs/proxy.md）----
mixed-port: 7890          # HTTP/SOCKS 统一端口，工具都指向 127.0.0.1:7890
allow-lan: false          # 不对局域网开放代理
bind-address: 127.0.0.1
mode: rule
log-level: info

# ---- 控制端 / Web UI ----
# 控制端只监听本机；secret 必填，换成本机随机值，不要留默认、不要入库。
external-controller: 127.0.0.1:9090
secret: "REPLACE_ME_LOCAL_SECRET"

# 托管面板（metacubexd / zashboard / yacd）从 https 访问本地 http 控制端时需放开 CORS：
external-controller-cors:
  allow-origins: ["*"]
  allow-private-network: true

# 可选：让 mihomo 自托管面板（离线可用），面板地址 http://127.0.0.1:9090/ui/
# external-ui: ui
# external-ui-name: metacubexd
# external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"

# ---- 节点来源（私有，必填）----
# 推荐用 proxy-providers 拉订阅；订阅 URL 是私有运行期状态，换成自己的，不入库。
# providers/ 目录已被 .gitignore 忽略。
proxy-providers:
  airport:
    type: http
    url: "REPLACE_ME_SUBSCRIPTION_URL"
    interval: 86400
    path: ./providers/airport.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

# 也可直接写静态节点。下面是 VLESS + Vision + REALITY 模板（自建节点常用，私有值用 REPLACE_ME 标出）：
proxies:
  - name: "vless-reality"
    type: vless
    server: REPLACE_ME_SERVER          # 服务器地址或域名
    port: 443
    uuid: REPLACE_ME_UUID              # 服务端生成的 UUID
    network: tcp
    udp: true
    tls: true
    flow: xtls-rprx-vision             # Vision 流控（REALITY 标配）
    servername: REPLACE_ME_SNI         # REALITY 借用的目标域名，需与服务端 dest / serverNames 一致
    client-fingerprint: chrome         # uTLS 指纹：chrome / firefox / safari / ios / random
    reality-opts:
      public-key: REPLACE_ME_PUBLIC_KEY  # 服务端公钥（x25519，与私钥配对）
      short-id: REPLACE_ME_SHORT_ID      # 可选，与服务端 short-id 一致；没有就删掉本行

proxy-groups:
  # 订阅(use: airport)和自建节点(proxies: vless-reality)可同时出现；
  # 只用其中一种时，把另一种来源行删掉，并删掉上面对应的 proxy-providers / proxies 段。
  - name: PROXY
    type: select
    proxies:
      - vless-reality
    use:
      - airport
  - name: AUTO
    type: url-test
    proxies:
      - vless-reality
    use:
      - airport
    url: https://www.gstatic.com/generate_204
    interval: 300

# ---- 规则 ----
rules:
  - GEOIP,CN,DIRECT
  - MATCH,PROXY

# ---- TUN（兜底，默认关闭）----
# TUN 容易和 WSL / Docker / VPN / Tailscale / 内网路由冲突，不建议默认常开；
# 仅在 per-app / 应用内代理都不奏效时按需临时开启。参考基线（见 manual-boundaries.md）：
# tun:
#   enable: true
#   stack: mixed
#   auto-route: true
#   auto-detect-interface: true
#   dns-hijack: [any:53, tcp://any:53]
#   strict-route: true
