name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository
        shell: pwsh
        run: ./windows/validate.ps1

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint WSL shell script
        run: |
          bash -n wsl/bootstrap.sh
          shellcheck --severity=warning wsl/bootstrap.sh
