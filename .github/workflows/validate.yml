name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository
        shell: pwsh
        run: ./windows/validate.ps1

      - name: Validate configure dry-run
        shell: pwsh
        run: ./windows/configure.ps1 -All -Plan

      - name: Validate WSL distro script
        shell: pwsh
        run: ./windows/wsl-distro.ps1 -Plan

      - name: Validate WSL files
        run: bash wsl/validate.sh

      - name: Validate macOS files
        run: bash mac/validate.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint WSL shell scripts
        run: |
          bash -n wsl/bootstrap.sh
          bash -n wsl/validate.sh
          shellcheck --severity=warning wsl/bootstrap.sh wsl/validate.sh

      - name: Lint macOS shell scripts
        run: |
          bash -n mac/bootstrap.sh
          bash -n mac/configure.sh
          bash -n mac/validate.sh
          bash -n mac/config/macos/defaults.sh
          shellcheck --severity=warning mac/bootstrap.sh mac/configure.sh mac/validate.sh mac/config/macos/defaults.sh
